# ============================================================
# 杉山先生・借金問題チャンネル 台本テンプレート設定
#
# 過去台本(Excel)を横断分析して、「毎回固定の定型文」と
# 「毎回変えるテーマ固有部分」を分離したもの。
# fixed_blocks / semi_fixed は原則そのまま使う（＝変えない）。
# philosophy / compliance を編集すると本編生成の方針が変わる。
# ============================================================

channel:
  name: "弁護士 杉山が解説する借金問題チャンネル（かなえ国際法律事務所）"
  host: "杉山先生（弁護士キャリア33年）"
  first_person: "私杉山"
  purpose: >
    借金・お金の問題に悩む人へ正しい知識と視点を届け、概要欄の公式LINE無料相談へ
    つなげる入口。売り込みではなく、信頼と「相談してみよう」という気持ちを育てる。

# --- 使用モデル（コストと品質の調整。ここを書き換えれば変わる）---
# 高い順: claude-opus-4-8 ＞ claude-sonnet-4-6 ＞ claude-haiku-4-5
# 台本本体は品質重視でOpus、企画出しと点検は安いSonnetでコスト節約（バランス設定）。
models:
  ideate: "claude-sonnet-4-6"   # 企画出し（安め）
  script: "claude-opus-4-8"     # 台本本体（品質重視）
  review: "claude-sonnet-4-6"   # コンプラ点検（安め）

# --- 利用額バロメーター ---------------------------------------
# AIの消費額は概算（USD課金をJPY換算）。実際の請求は Anthropic Console で確認。
billing:
  usd_to_jpy: 160          # 円換算レート（適宜更新）
  monthly_budget_jpy: 2000 # 月の予算。バロメーターの満タン基準

# --- 杉山先生の価値観（本編の質を左右する最重要ブロック）-----
philosophy:
  core:
    - "借金をすることは必ずしも悪ではない。債務者を決して責めない・貶めない。"
    - "個人の経済破綻の多くは、本人の怠惰や浪費ではなく、社会・経済の変動が原因である、という視点を持つ。"
    - "制度の説明だけで終わらせず、視聴者にとっての“意味”と“次の一歩”を必ず示す。"
    - "先生自身の問題意識・メッセージを込める。ただしテーマ選びは『視聴者が見たい・検索する需要』を最優先にする。"
  forbidden_expressions:
    - "「借金の末路」「自業自得」「身から出た錆」など、債務者を貶める表現"
    - "「だらしない」「浪費癖」「自己責任」など、本人を責めるニュアンス"
    - "過去動画と切り口・結論が丸かぶりする内容（焼き直しはNG）"
  message_requirement: >
    本編は制度紹介で終わらせず、視聴者が持ち帰れる価値（具体的な行動・損得・不安の解消・
    判断の基準など）を必ず入れる。歴史や社会的背景は、テーマに自然に効くときだけ補助的に使う
    （毎回入れる必要はない。歴史の解説に寄せすぎない）。

# --- 伸びる企画の型（テーマ選び・タイトルの基準）-------------
clickability:
  principle: >
    動画は見られて初めて意味がある。テーマとタイトルは「先生が話したいこと」より
    「視聴者が見たい・検索すること」を優先する。reference_videos.txt の伸びている
    タイトルを分析し、その型でこのチャンネルの企画を作る。
  patterns:
    - "視聴者の具体的な不安・疑問に直接答える（家族にバレる？車は残る？ など）"
    - "Yes/Noや数字で気になる問い（〜は何年で消える？／残せるケースは？）"
    - "損得・やってはいけない系（知らないと損／やりがちな失敗／NG行動）"
    - "自分ごと化できる状況設定（督促が来た、差し押さえ、親の借金、スマホは使える？）"
    - "不安→安心の流れ（怖いテーマでも、最後に救いと次の一歩を必ず示す）"
  caution: "クリック目的でも、債務者を貶める煽り（「借金の末路」等）は使わない。怖がらせて終わらせない。"
  reference_file: "config/reference_videos.txt"

# --- 扱わないテーマ（企画から除外）---------------------------
# 問い合わせが来ても売上につながらない・対応できないテーマはここに足す。
avoid_topics:
  - topic: "過払い金請求（過払い金）"
    reason: "現在は対象者がほとんどおらず、問い合わせが来ても売上につながらないため"

# --- 視聴者ターゲット -----------------------------------------
audience:
  primary: "40〜50代の男性（視聴者の約8割）"
  segments:
    - "借金を抱え、債務整理を検討している人"
    - "債務整理という言葉は知らないが、借金をどうにかしたい人"
    - "身内や友人の借金問題に対して何かできないか考えている人"
    - "借金はないが、お金にまつわる問題を抱えている人"
  mindset: "人に相談しづらく自分を責めがち。専門用語が苦手。安心と次の一歩を求めている。"

# --- 台本の仕様（文字数・尺・行の作り方）---------------------
script_spec:
  chars_per_minute: 450          # 450文字 ≒ 1分
  target_total_chars: 4500       # これを超えるように（=10分超）
  recommend_total_chars: 6000    # 目安。13〜14分程度
  line_max_chars: 50             # 1行(=1ナレーション/字幕)の上限の目安
  reference_rule: "冒頭とED以外は、本編の各まとまりに参考記事を2記事以上記載する（同じ記事の同じ構成順にしない）"

# --- 語り口 ---------------------------------------------------
voice:
  tone: "落ち着いて丁寧だが、芯がある。視聴者を絶対に責めない。"
  style:
    - "話し言葉。声に出して自然に読める文体。1行を短く。"
    - "専門用語は必ず直後にやさしく言い換える。"
    - "「〜なんです」「〜という方もよくいらっしゃいます」など共感を挟む。"
    - "問いかけ（〜でしょうか？）で視聴者を巻き込む。"

# ============================================================
# 定型文（fixed_blocks）：毎回そのまま使う。原則変更しない。
# それぞれ「1行 = 台本の1ナレーション行」として書いている。
# ============================================================
fixed_blocks:
  self_intro:
    - "こんにちは。弁護士キャリア33年、かなえ国際法律事務所の杉山です。"

  # 冒頭のLINE誘導（緑背景）
  cta_intro:
    - "このチャンネルでは、債務整理を中心に"
    - "借金問題の解決に役立つ情報をお届けしています。"
    - "また、いままさに借金問題で困っているという方については、"
    - "公式ＬＩＮＥからのお問い合わせや、無料相談も受け付けていますので、"
    - "身近に相談できる人がいない、という方は、"
    - "概要欄のURLからLINEに登録してみてください。"
    - "無料相談という小さな一歩が、小さくて大きな一歩になるかもしれません。"

  # 中盤のLINE誘導（緑背景・全面パネル）
  cta_mid:
    - "※ここは画面全面にパネルを入れて、音声のみ入る予定です※"
    - "私の在籍しているかなえ国際法律事務所では、LINEでの無料相談を受け付けています。"
    - "また、現在は、LINE登録特典として、"
    - "これから債務整理をしようという方が、何から手を付け、どう準備すればよいのか、"
    - "何に注意すればよいのかがよく解る、スターターマップをお送りしています。"
    - "これを見れば、債務整理をしたいと思いつつ、不安で踏み切れなかったという方も、"
    - "不安が解消され、一歩を踏み出す勇気が湧いてくるものと思います。"
    - "身近に相談できる人がいないという方は、概要欄のURLからお気軽にご相談ください。"

  # まとめ直前のCTA＋チャンネル誘導（緑背景）
  closing_cta:
    - "私が在籍しているかなえ国際法律事務所でも、"
    - "借金問題やその他さまざまな法律問題について、相談や弁護依頼を受け付けています。"
    - "公式LINEから簡単にお問い合わせができますので、"
    - "身近に弁護士の知り合いがいないという方は、この機会に是非、登録してみてはいかがでしょうか。"
    - "このチャンネルでは、今後も"
    - "できる限り法律のことを分かりやすく解説した動画をアップしていきますので、"
    - "「チャンネル登録」「高評価」「コメント」をよろしくお願いいたします！"
    - "それでは本日のまとめです。"
    - "以下まとめ↓"

  # エンディング（毎回固定）
  ending:
    - "ここまで見てくださり本当にありがとうございます！"
    - "いつも、高評価、コメントをしてくださる皆さん本当にありがとうございます！"
    - "これからも皆さんに有益な情報を発信していきますので、どうかよろしくお願いします。"
    - "それでは、次の動画でまたお会いしましょう。"
    - "さようなら。"

# ============================================================
# 半固定（semi_fixed）：型は固定、{ }の中だけテーマで変わる
# ============================================================
semi_fixed:
  theme_statement: "今回は「{theme}」というテーマでお話ししていきたいと思います。"
  expert_declaration: "現役の弁護士である私杉山が、いつものように解りやすく解説していきたいと思います。"
  viewer_close: "今回の動画を是非最後までご覧ください。"
  transition_to_summary: "さて、本日の動画はいかがだったでしょうか？"
  summary_open: "今回は「{theme}」というテーマでお話ししてきました。"

# 台本の項目（役割ラベル）の並び
section_flow:
  - 最初の引き＆自己紹介
  - テーマ明言
  - 視聴者の気持ちを代弁
  - 認識のギャップを突いて視聴意欲掻き立て
  - 視聴人物像の明確化
  - （LINE誘導）
  - 本編
  - LINE誘導
  - 本編（続き）
  - まとめ
  - ED

# --- コンプライアンス（厳しめ運用）---------------------------
compliance:
  principles:
    - "断定的・誇大な表現をしない（効果や結果を保証しない）"
    - "他の弁護士・事務所を誹謗中傷しない"
    - "不安をあおって契約を急がせない"
    - "個別の法律判断は「ケースによる」前提を必ず添える"
    - "数字・実績は根拠のない断定を避ける"
    - "債務者を貶める・責める表現をしない（借金は必ずしも悪ではない）"
  # 機械的にスキャンするNG表現（債務者を貶める語に絞る。文脈依存語は入れない）
  ng_phrases:
    - "借金の末路"
    - "自業自得"
    - "身から出た錆"
    - "だらしない人"
    - "必ず減額"
    - "確実に解決"
    - "100%"
    - "絶対に"
  required_disclaimer: >
    動画内のどこかで「具体的な結果は状況によって異なるため、まずは個別にご相談を」
    という趣旨の一言を必ず入れる。
